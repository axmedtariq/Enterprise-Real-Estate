services:

  # 🏛️ VAULT (Production Server)
  vault:
    image: hashicorp/vault:latest
    container_name: sovereign_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: https://0.0.0.0:8200
      VAULT_SKIP_VERIFY: "true" # For dev/localhost testing with self-signed
    command: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config:/vault/config:ro
      - ./vault/data:/vault/data
      - ./vault/certs:/vault/certs:ro
      - ./vault/logs:/vault/logs
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🗄️ SQL SERVER
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sovereign_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPassword123!"
    ports:
      - "1433:1433"
    restart: unless-stopped
    networks:
      - sovereign-net

  # ⚙️ BACKEND
  backend:
    build: ./backend
    container_name: sovereign_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: StrongPassword123!
      VAULT_ADDR: https://vault:8200
      VAULT_ROLE_ID: "sovereign-backend-role-id"
      VAULT_SECRET_ID: "sovereign-backend-secret-id"
      NODE_TLS_REJECT_UNAUTHORIZED: "0" # Allow self-signed in docker-net
      LOGSTASH_HOST: logstash
    depends_on:
      - db
      - vault
      - logstash
    networks:
      - sovereign-net

  # 🎨 FRONTEND
  frontend:
    build: ./frontend-next
    container_name: sovereign_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
    depends_on:
      - backend
    networks:
      - sovereign-net

  # 📊 PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    container_name: sovereign_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🐳 CADVISOR
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: sovereign_cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8083:8080"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 📈 GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: sovereign_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🚨 ALERTMANAGER
  alertmanager:
    image: prom/alertmanager:latest
    container_name: sovereign_alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🚀 REDIS (Caching Layer)
  redis:
    image: redis:7.0-alpine
    container_name: sovereign_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🛡️ NGINX REVERSE PROXY (WAF + SSL TERMINATION)
  nginx:
    image: owasp/modsecurity-crs:nginx
    container_name: sovereign_nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BACKEND=http://backend:5000
      - MODSECURITY_ENABLED=on
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🔐 CERTBOT (SSL AUTO-RENEWAL)
  certbot:
    image: certbot/certbot
    container_name: sovereign_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🗄️ ELASTICSEARCH (Deep Log Storage - SECURED)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: sovereign_elastic
    environment:
      - node.name=elastic
      - cluster.name=sovereign-logs
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=sovereign_elite_pass
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🌉 LOGSTASH (Log Router - AUTH ENABLED)
  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.0
    container_name: sovereign_logstash
    volumes:
      - ./logging/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
      - "5044:5044/udp"
      - "5000:5000/tcp"
      - "5000:5000/udp"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASSWORD=sovereign_elite_pass
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - sovereign-net

  # 📊 KIBANA (Forensic Dashboard - AUTH ENABLED)
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0
    container_name: sovereign_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=sovereign_elite_pass
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - sovereign-net

volumes:
  grafana_data:
  elastic_data:


networks:
  sovereign-net:
    driver: bridge
