services:

  # 🏛️ VAULT
  vault:
    image: hashicorp/vault:1.15.3
    container_name: sovereign_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: vault server -dev
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config:/vault/config:ro
      - ./vault/data:/vault/data
      - ./vault/certs:/vault/certs:ro
      - ./vault/logs:/vault/logs
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🗄️ SQL SERVER
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sovereign_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "abc123"
    ports:
      - "1433:1433"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 📊 MSSQL EXPORTER
  mssql_exporter:
    image: awaragi/prometheus-mssql-exporter:latest
    container_name: sovereign_mssql_exporter
    environment:
      - SERVER=db
      - USERNAME=Tariq
      - PASSWORD=abc123
    ports:
      - "4000:4000"
    depends_on:
      - db
    networks:
      - sovereign-net

  # ⚙️ BACKEND
  backend:
    build: ./backend
    container_name: sovereign_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "root-token"
      DATABASE_URL: "sqlserver://db:1433;database=RealEstate;user=Tariq;password=abc123;encrypt=false;trustServerCertificate=true"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - vault
    networks:
      - sovereign-net

  # 🎨 FRONTEND
  frontend:
    build: ./frontend-next
    container_name: sovereign_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
    depends_on:
      - backend
    networks:
      - sovereign-net

  # 📊 PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    container_name: sovereign_prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🐳 CADVISOR
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: sovereign_cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8083:8080"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 📈 GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: sovereign_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_SECRET_KEY: "01234567890123456789012345678901" # 32 bytes fixed
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🚨 ALERTMANAGER
  alertmanager:
    image: prom/alertmanager:latest
    container_name: sovereign_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🚀 REDIS
  redis:
    image: redis:7.0-alpine
    container_name: sovereign_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🛡️ NGINX
  nginx:
    image: nginx:alpine
    container_name: sovereign_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🔐 CERTBOT
  certbot:
    image: certbot/certbot
    container_name: sovereign_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🕵️ JAEGER
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sovereign_jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
    restart: unless-stopped
    networks:
      - sovereign-net

  # 🛰️ KIALI
  kiali:
    image: quay.io/kiali/kiali:latest
    container_name: sovereign_kiali
    environment:
      - AUTH_STRATEGY=anonymous
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
      - SERVER_WEB_SECRET_KEY=01234567890123456789012345678901 # 32 bytes
    ports:
      - "20001:20001"
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped
    networks:
      - sovereign-net

volumes:
  grafana_data:


networks:
  sovereign-net:
    driver: bridge
