# 🛡️ SOVEREIGN MICROSERVICES CLUSTER (Hardened)
name: sovereign-enterprise-microservices

services:
  # 1. ⚛️ FRONTEND LAYER
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: sovereign_client
    networks:
      - sovereign_lan
    ports:
      - "3000:8080"
    restart: unless-stopped
    depends_on:
      - gateway

  # 2. 🛰️ API GATEWAY (Public Facing)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: sovereign_gateway
    networks:
      - sovereign_lan
      - sovereign_svc
    ports:
      - "5000:5000"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # 3. 🔐 AUTH SERVICE
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: sovereign_auth_svc
    networks:
      - sovereign_svc
    env_file: .env
    environment:
      - PORT=5001
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # 4. 🏘️ PROPERTY SERVICE
  property-service:
    build:
      context: ./services/property-service
      dockerfile: Dockerfile
    container_name: sovereign_property_svc
    networks:
      - sovereign_svc
    env_file: .env
    environment:
      - PORT=5002
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # 5. 💳 BOOKING SERVICE
  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: sovereign_booking_svc
    networks:
      - sovereign_svc
    env_file: .env
    environment:
      - PORT=5003
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  sovereign_lan: # Client to Gateway
    driver: bridge
  sovereign_svc: # Internal Service Traffic ONLY
    internal: true
