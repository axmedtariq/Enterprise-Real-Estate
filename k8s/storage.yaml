# 🏛️ SOVEREIGN STORAGE INFRASTRUCTURE
# Multi-Tier persistent access for Database, Cache and Backups

apiVersion: v1
kind: PersistentVolume
metadata:
  name: sql-pv
spec:
  capacity:
    storage: 20Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/sqlserver"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sql-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
# 📦 BACKUP STORAGE (High Capacity / Multi-node access)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sql-backup-pv
spec:
  capacity:
    storage: 50Gi
  accessModes: ["ReadWriteMany"]
  hostPath:
    path: "/mnt/data/sqlbackups"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sql-backup-pvc
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 50Gi
