apiVersion: v1
kind: Service
metadata:
  name: vault
  labels:
    app: vault
spec:
  type: ClusterIP
  ports:
    - port: 8200
      targetPort: 8200
      protocol: TCP
      name: http
  selector:
    app: vault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
      - name: vault
        image: hashicorp/vault:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
        ports:
        - containerPort: 8200
          name: vault-port
        env:
        - name: VAULT_ADDR
          value: "https://0.0.0.0:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        args:
        - "server"
        - "-config=/vault/config/vault.hcl"
        volumeMounts:
        - name: vault-config
          mountPath: /vault/config/vault.hcl
          subPath: vault.hcl
        - name: vault-data
          mountPath: /vault/data
        - name: vault-certs
          mountPath: /vault/certs
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: vault-config
        configMap:
          name: vault-config
      - name: vault-data
        persistentVolumeClaim:
          claimName: vault-pvc
      - name: vault-certs
        secret:
          secretName: vault-tls-certs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
data:
  vault.hcl: |
    ui = true
    disable_mlock = true
    storage "file" {
      path = "/vault/data"
    }
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_cert_file = "/vault/certs/vault.pem"
      tls_key_file  = "/vault/certs/vault-key.pem"
    }
    api_addr = "https://vault:8200"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
