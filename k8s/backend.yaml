apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: backend
      annotations:
        # 🏛️ SOVEREIGN VAULT SIDECAR INJECTION
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sovereign-backend"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/sovereign-estate"
        # Template to inject secrets as environment variables file
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/sovereign-estate" -}}
          export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end -}}
    spec:
      initContainers:
      - name: db-migration
        image: sovereign-global/elite-estate-backend:latest
        command: ["/bin/sh", "-c", "npx prisma migrate deploy"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
               name: sql-secret
               key: database-url
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values: ["backend"]
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: backend
        image: sovereign-global/elite-estate-backend:latest
        command: ["/bin/sh", "-c", "source /vault/secrets/config && npm start"]
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
        env:
        - name: VAULT_ADDR
          value: "https://vault:8200"
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
