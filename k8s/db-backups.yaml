# 📂 Database Maintenance Manifests
# Automated Backups & Maintenance for Sovereign Estate

apiVersion: batch/v1
kind: CronJob
metadata:
  name: sqlserver-backup-daily
spec:
  schedule: "0 1 * * *" # Every day at 01:00 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: sql-backup
            image: mcr.microsoft.com/mssql-tools18:latest
            command:
            - /bin/bash
            - -c
            - |
              # 🏛️ SOVEREIGN DATABASE BACKUP SEQUENCE (PITR Ready)
              BACKUP_FILE="/backups/Sovereign_Full_$(date +%Y%m%d_%H%M%S).bak"
              echo "INITIATING FULL SYSTEM BACKUP: ${BACKUP_FILE}"
              
              /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P $MSSQL_SA_PASSWORD -C -Q \
              "BACKUP DATABASE [RealEstate] TO DISK = '${BACKUP_FILE}' WITH FORMAT, MEDIANAME = 'RealEstateBackups', NAME = 'Full Backup of RealEstate';"
              
              echo "BACKUP SUCCESSFUL. SYSTEM SYNCED."

            env:
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-secret
                  key: password
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: sql-backup-pvc
          restartPolicy: OnFailure
---
# 🔍 POINT-IN-TIME RECOVERY CRON (Transaction Log Backups)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sqlserver-backup-logs
spec:
  schedule: "*/15 * * * *" # Every 15 minutes (RPO of 15 min)
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: sql-log-backup
            image: mcr.microsoft.com/mssql-tools18:latest
            command:
            - /bin/bash
            - -c
            - |
              LOG_FILE="/backups/logs/Sovereign_Log_$(date +%Y%m%d_%H%M%S).trn"
              mkdir -p /backups/logs
              /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P $MSSQL_SA_PASSWORD -C -Q \
              "BACKUP LOG [RealEstate] TO DISK = '${LOG_FILE}' WITH NOINIT, NAME = 'Log Backup of RealEstate';"
            env:
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-secret
                  key: password
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: sql-backup-pvc
          restartPolicy: OnFailure
