apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  slack-token: "xoxb-YOUR-SLACK-BOT-TOKEN"  # 🔴 REPLACE THIS WITH YOUR SLACK BOT TOKEN 🔴
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # 1. Connect ArgoCD with your Slack bot token
  service.slack: |
    token: $slack-token

  # 2. Add an elegant Template for when Health Degrades (e.g., CrashLoopBackOff)
  template.app-health-degraded: |
    slack:
      attachments: |
        [{
          "title": "🚨 ArgoCD Alert: {{.app.metadata.name}} Health Degraded",
          "title_link": "https://argocd.sovereign-control.local/applications/{{.app.metadata.name}}",
          "color": "#ff0000",
          "text": "The deployment *{{.app.metadata.name}}* is currently in a *Degraded* state.\nThis usually means pods are failing (CrashLoopBackOff or ImagePullBackOff).\n\n*Namespace:* {{.app.spec.destination.namespace}}\n<https://argocd.sovereign-control.local/applications/{{.app.metadata.name}}|🔍 View in ArgoCD>"
        }]

  # 3. Add an elegant Template for when Sync Fails 
  template.app-sync-failed: |
    slack:
      attachments: |
        [{
          "title": "❌ ArgoCD Alert: {{.app.metadata.name}} Sync Failed",
          "title_link": "https://argocd.sovereign-control.local/applications/{{.app.metadata.name}}",
          "color": "#ffc107",
          "text": "The automatic synchronization for *{{.app.metadata.name}}* has failed.\n\n*Destination Cluster:* {{.app.spec.destination.server}}\n<https://argocd.sovereign-control.local/applications/{{.app.metadata.name}}|🔍 Inspect Logs in ArgoCD>"
        }]

  # 4. Bind triggers to templates
  trigger.on-health-degraded: |
    - description: Application has degraded
      send:
      - app-health-degraded
      when: app.status.health.status == 'Degraded'
      
  trigger.on-sync-failed: |
    - description: Application syncing has failed
      send:
      - app-sync-failed
      when: app.status.operationState.phase in ['Error', 'Failed']
