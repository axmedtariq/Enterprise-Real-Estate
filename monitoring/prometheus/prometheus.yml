global:
  scrape_interval: 15s

rule_files:
  - 'alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'sovereign_backend'
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:5000']

  - job_name: 'cadvisor'
    scrape_interval: 5s
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'vault'
    metrics_path: "/v1/sys/metrics"
    params:
      format: ['prometheus']
    scheme: http
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['vault:8200']

  - job_name: 'mssql_exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['mssql_exporter:4000']
