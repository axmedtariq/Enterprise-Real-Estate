route:
  receiver: 'slack-notifications'
  group_by: ['alertname', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

inhibit_rules:
  # Inhibit warning-level notifications if a critical-level notification
  # is already firing for the same alertname and instance.
  # This prevents 50 warnings firing at the same time a critical issue goes off!
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'instance']

receivers:
  - name: 'slack-notifications'
    slack_configs:
      # 🔴 REPLACE THIS WITH YOUR SLACK INCOMING WEBHOOK URL 🔴
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/LINK' 
        channel: '#cicd-alerts'
        send_resolved: true
        title: |-
          {{ if eq .Status "firing" }}🚨 CRITICAL: {{ .CommonLabels.alertname }}{{ else }}✅ RESOLVED: {{ .CommonLabels.alertname }}{{ end }}
        text: >-
          {{ range .Alerts -}}
          *App:* sovereign-api
          *Metric:* `{{ .Labels.alertname }}` triggered (Threshold Exceeded)
          *Impact:* {{ .Annotations.summary }} - {{ .Annotations.description }}
          *Dashboard:* <http://localhost:3001/d/sovereign-full-stack/sovereign-full-stack-health|📊 Click to view full-stack Grafana>
          *Runbook:* <{{ .Annotations.runbook_url }}|📖 How to fix {{ .Labels.alertname }}>
          {{ end }}
